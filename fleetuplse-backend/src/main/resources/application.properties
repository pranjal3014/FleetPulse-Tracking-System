spring.application.name=fleetuplse-backend

server.port=${PORT:8080}
# Local defaults keep the backend runnable during development.
# You can still override these with DB_URL, DB_USERNAME and DB_PASSWORD environment variables.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fleetpulse_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# Route Engine Configuration

osrm.base-url=https://router.project-osrm.org

nominatim.base-url=https://nominatim.openstreetmap.org

#SWAGGER CONFIGURATION
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
